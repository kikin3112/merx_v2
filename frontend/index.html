<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Carbon Vivo: apply stored theme before React hydrates (prevents FOUC) -->
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('merx_theme') || '{}');
        var t = (s.state && s.state.theme) || 'dark';
        document.documentElement.classList.add(t);
      } catch(e) { document.documentElement.classList.add('dark'); }
    </script>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ChandeliERP</title>
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NC0VEQ3T54"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NC0VEQ3T54', { send_page_view: false, cookie_domain: window.location.hostname, cookie_flags: 'SameSite=Lax' });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
