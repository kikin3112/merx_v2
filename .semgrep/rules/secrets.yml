rules:
  # Rule 1: Hardcoded password strings
  - id: hardcoded-password-python
    patterns:
      - pattern: $VAR = "$PASS"
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)(password|passwd|pwd|secret|token|api_key|apikey|auth_key)'
      - metavariable-regex:
          metavariable: $PASS
          # Matches non-empty strings that aren't environment variable references
          regex: '^(?!.*\$\{|.*os\.environ|.*getenv|.*\btest\b|\bchangeme\b|\bexample\b).{4,}$'
    message: >
      Potential hardcoded credential in variable '$VAR'. Use environment
      variables or a secrets manager instead: os.environ.get("SECRET_KEY")
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-798
      owasp: A07:2021 - Identification and Authentication Failures
      confidence: MEDIUM

  # Rule 2: Hardcoded DB connection strings
  - id: hardcoded-db-connection-string
    patterns:
      - pattern: $VAR = "$CONN"
      - metavariable-regex:
          metavariable: $CONN
          regex: '^(postgresql|postgres|mysql|sqlite):\/\/[^@]+:[^@]+@'
    message: >
      Hardcoded database connection string detected in '$VAR'. Move the
      connection string to environment variables and load via
      pydantic-settings or os.environ.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-798
      confidence: HIGH

  # Rule 3: Hardcoded JWT secret
  - id: hardcoded-jwt-secret
    patterns:
      - pattern: create_access_token(..., secret="$SECRET", ...)
      - pattern-not: create_access_token(..., secret=settings.$FIELD, ...)
      - pattern-not: create_access_token(..., secret=os.environ.get(...), ...)
    message: >
      JWT secret appears to be hardcoded. Use settings.SECRET_KEY loaded
      from environment variables.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-798
      confidence: HIGH

  # Rule 4: AWS/cloud credentials in JS/TS
  - id: hardcoded-aws-key-js
    patterns:
      - pattern: const $VAR = "$VALUE"
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)(aws_access|aws_secret|aws_key|api_key|apikey|secret_key)'
      - metavariable-regex:
          metavariable: $VALUE
          regex: '^(?!.*process\.env|.*import\.meta\.env).{8,}$'
    message: >
      Potential hardcoded cloud credential '$VAR' in JavaScript/TypeScript.
      Use environment variables (import.meta.env.VITE_* for Vite) instead.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-798
      confidence: MEDIUM

  # Rule 5: print() with password/token variables (accidental logging)
  - id: python-credential-in-print
    patterns:
      - pattern: print(..., $VAR, ...)
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)(password|passwd|token|secret|key|credential)'
    message: >
      Potential credential '$VAR' passed to print(). This may expose
      sensitive data in logs. Use a safe log masking approach.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-532
      confidence: LOW
