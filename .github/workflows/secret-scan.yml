name: Secret Scanning — Gitleaks + TruffleHog

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  schedule:
    # TruffleHog full history scan — every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'

jobs:
  gitleaks:
    name: Gitleaks — PR diff scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: detect --config=.gitleaks.toml --redact --verbose

  trufflehog:
    name: TruffleHog — Historical scan
    runs-on: ubuntu-latest
    # Only run on schedule or manual dispatch (avoid redundant runs on every PR)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog full history scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --only-verified --json
