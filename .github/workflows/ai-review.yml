name: AI Security Review — Claude PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-security-review:
    name: Claude Security Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install review script dependencies
        run: pip install anthropic httpx

      - name: Get PR diff
        id: diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Run Claude security review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        run: python .security/scripts/ai-pr-review.py

      - name: Block merge on CRITICAL finding
        if: steps.review.outputs.severity == 'CRITICAL'
        run: |
          echo "::error::Claude AI review found CRITICAL security issue. Merge blocked."
          exit 1
