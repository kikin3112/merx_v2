name: Container Security — Trivy Image Scan

on:
  push:
    branches: [master, develop]
  schedule:
    # Docker Bench weekly report — every Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  trivy-image:
    name: Trivy — Image vulnerability scan
    runs-on: ubuntu-latest
    # Only run on push (image must be built first) or manual/schedule
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          load: true
          tags: chandelier-backend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: chandelier-backend:scan
          format: sarif
          output: trivy-image-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          # Block deployment on CVSS 9.0+ (CRITICAL severity)
          ignore-unfixed: false

      - name: Upload Trivy backend results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-backend.sarif
          category: trivy-image-backend

      - name: Build frontend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          load: true
          tags: chandelier-frontend:scan
          cache-from: type=gha

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: chandelier-frontend:scan
          format: sarif
          output: trivy-image-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: false

      - name: Upload Trivy frontend results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-frontend.sarif
          category: trivy-image-frontend

  docker-bench:
    name: Docker Bench — Hardening report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Docker Bench Security
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /etc:/etc:ro \
            -v /lib/systemd:/lib/systemd:ro \
            --pid host \
            --net host \
            --cap-add audit_control \
            -e DOCKER_CONTENT_TRUST=$DOCKER_CONTENT_TRUST \
            docker/docker-bench-security \
            2>&1 | tee docker-bench-results.txt
        continue-on-error: true

      - name: Upload Docker Bench results
        uses: actions/upload-artifact@v4
        with:
          name: docker-bench-report
          path: docker-bench-results.txt
          retention-days: 30
