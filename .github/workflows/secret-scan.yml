name: Secret Scanning — Gitleaks + TruffleHog

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  schedule:
    # TruffleHog full history scan — every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'

jobs:
  gitleaks:
    name: Gitleaks — scan for secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --config=.gitleaks.toml \
            --redact \
            --verbose \
            --exit-code=1
        # Exit code 1 = secrets found → fails the job

  trufflehog:
    name: TruffleHog — full history scan
    runs-on: ubuntu-latest
    # Only runs on weekly schedule or manual trigger
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --only-verified
