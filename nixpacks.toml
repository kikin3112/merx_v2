[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "gcc", "postgresql"]

[phases.install]
cmds = ["python3.12 -m pip install uv", "uv sync --no-dev"]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "sh -c 'alembic upgrade head && uvicorn backend.app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 2'"

[variables]
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"
