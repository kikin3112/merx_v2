# Pre-commit hooks for chandelierp
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# https://pre-commit.com

repos:
  # -----------------------------------------------------------------------
  # Standard file hygiene
  # -----------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, master]
      - id: check-added-large-files
        args: [--maxkb=500]
        # Block files over 500KB (prevents accidental binary commits)

  # -----------------------------------------------------------------------
  # Secret scanning — blocks commits with credentials
  # -----------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: [--config=.gitleaks.toml, --redact, --verbose]

  # -----------------------------------------------------------------------
  # Python — Ruff linter + formatter
  # -----------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # -----------------------------------------------------------------------
  # Python — security checks
  # -----------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, backend/app/]
        files: ^backend/app/

  # -----------------------------------------------------------------------
  # Commit message format
  # -----------------------------------------------------------------------
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
